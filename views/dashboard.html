<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/dashboard.css" />
</head>
<header class="topbar">
  <div class="topbar-inner">
    <div class="left">
      <span class="logo">AUTIZMUS MAXIMUS</span>
    </div>
    <div class="right">
      <button class="login">👤</button>
      <button class="logout"> <a href="/logout">Log Out</a></button>
    </div>
  </div>
</header>

<div class="coinstatcont">

  %for coin_id,data in box_el.items():
  <div class = "coinstat">
      <button class="coin-select" onclick="location.href='/coin/{{coin_id}}'">
          <img src="{{data['logo']}}" class="coin-logo">
          <h1>{{data["name"]}}</h1>
          Price: 
          %if 0 > data["change"]:
              <span style="color: rgb(255, 0, 0);">{{round(data["price"], 2)}} -{{round(data["change"]/data["price"] * 100, 2)}}%</span>
          % else:
              <span style="color: green;">{{round(data["price"], 2)}} +{{round(data["change"]/data["price"] * 100, 2)}}%</span>
          % end
          <br>
          <label for="market-change">market change 24h:</label>
          <span style="color: green; font-size: small;">bought</span>
          <progress class = "market-change" id="market-change" value="{{data['market_change'][list(data['market_change'].keys())[0]][0]}}" max="100"> </progress>
          <span style="color: red; font-size: small;">sold</span>
      </button>
  </div>
  % end
</div>

<form method="POST" action="/dashboard">
<label style="color: #f0b90b;" for="type-buy">Action:</label>
<input type="radio" id="type-buy" name="type" value="1" required>
  <label style="color: #f0b90b;" for="type-buy">buy</label>
<input type="radio" id="type-sell" name="type" value="2">
  <label style="color: #f0b90b;" for="type-sell">sell</label>

<label style="color: #f0b90b;" for="coin">Coin:</label>

%for coin_id,data in box_el.items():
<input type="radio" name="coin" value="{{coin_id}}">
  <label style="color: #f0b90b;" for="coin">{{data["name"]}}</label>
  % end
</input>

<div class="amount">
  <input type="range" min="0" max="100" value="50" class="slider" id="amount" name="amount">
  <span id="amount-value">50</span>%
</div>

<input type="submit" value="Submit" class="submit-btn">
</form>

<script>
  const amountSlider = document.getElementById('amount');
  const amountValue = document.getElementById('amount-value');
  if (amountSlider && amountValue) {
    amountSlider.addEventListener('input', () => {
      amountValue.textContent = amountSlider.value;
    });
  }
</script>

</body>
