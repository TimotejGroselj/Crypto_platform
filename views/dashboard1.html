<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/dashboard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #080b12;
            --surface:   #0e1420;
            --border:    #1a2235;
            --accent:    #00e5b0;
            --accent2:   #0099ff;
            --up:        #00e5b0;
            --down:      #ff3d5a;
            --text:      #e8eef8;
            --muted:     #5a6a85;
            --card-glow: rgba(0, 229, 176, 0.06);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            overflow-x: hidden;
        }

        /* ── grid noise texture ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,176,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,176,.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── ambient glow orbs ── */
        body::after {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,153,255,.07) 0%, transparent 70%);
            top: -200px; right: -100px;
            pointer-events: none;
            z-index: 0;
        }

        /* ════════════════ TOPBAR ════════════════ */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8, 11, 18, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .topbar-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: .18em;
            color: var(--accent);
            text-transform: uppercase;
            position: relative;
        }

        .logo::before {
            content: '';
            position: absolute;
            left: -14px; top: 50%;
            transform: translateY(-50%);
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,100% { opacity: 1; box-shadow: 0 0 6px var(--accent); }
            50%      { opacity: .4; box-shadow: 0 0 16px var(--accent); }
        }

        .topbar .right {
            display: flex;
            align-items: center;
            gap: .75rem;
        }

        .topbar button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: .45rem .9rem;
            font-family: 'Syne', sans-serif;
            font-size: .8rem;
            font-weight: 600;
            cursor: pointer;
            transition: border-color .2s, background .2s;
        }

        .topbar button:hover { border-color: var(--accent); background: rgba(0,229,176,.06); }

        .topbar .logout a {
            color: inherit;
            text-decoration: none;
        }

        /* ════════════════ PAGE LAYOUT ════════════════ */
        .page-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2.5rem 2rem 4rem;
        }

        /* ── section header ── */
        .section-header {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .section-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -.01em;
        }

        .section-header .sub {
            font-family: 'Space Mono', monospace;
            font-size: .7rem;
            color: var(--muted);
            letter-spacing: .1em;
            text-transform: uppercase;
        }

        /* ════════════════ COIN GRID ════════════════ */
        .coinstatcont {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.25rem;
        }

        .coinstat {
            position: relative;
            border-radius: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform .25s, border-color .25s, box-shadow .25s;
            animation: fadeUp .4s ease both;
        }

        .coinstat:nth-child(1) { animation-delay: .05s }
        .coinstat:nth-child(2) { animation-delay: .1s }
        .coinstat:nth-child(3) { animation-delay: .15s }
        .coinstat:nth-child(4) { animation-delay: .2s }
        .coinstat:nth-child(5) { animation-delay: .25s }
        .coinstat:nth-child(6) { animation-delay: .3s }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .coinstat:hover {
            transform: translateY(-4px);
            border-color: rgba(0,229,176,.35);
            box-shadow: 0 12px 40px rgba(0,229,176,.08), 0 0 0 1px rgba(0,229,176,.1);
        }

        /* card top accent line */
        .coinstat::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            opacity: 0;
            transition: opacity .25s;
        }

        .coinstat:hover::before { opacity: 1; }

        /* ── coin button ── */
        .coin-select {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: .55rem;
            width: 100%;
            padding: 1.4rem 1.5rem;
            background: transparent;
            border: none;
            cursor: pointer;
            text-align: left;
            color: var(--text);
            font-family: 'Syne', sans-serif;
        }

        /* ── top row: logo + name ── */
        .coin-top {
            display: flex;
            align-items: center;
            gap: .7rem;
            width: 100%;
        }

        .coin-logo {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: contain;
            background: rgba(255,255,255,.04);
            padding: 3px;
            flex-shrink: 0;
        }

        .coin-name {
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: -.01em;
            line-height: 1;
            margin: 0;
        }

        /* ── price row ── */
        .coin-price-row {
            width: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        .price-label {
            font-family: 'Space Mono', monospace;
            font-size: .65rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: .15rem;
        }

        .price-value {
            font-family: 'Space Mono', monospace;
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1;
        }

        .price-value.up   { color: var(--up); }
        .price-value.down { color: var(--down); }

        /* ── change badge ── */
        .change-badge {
            font-family: 'Space Mono', monospace;
            font-size: .68rem;
            font-weight: 700;
            padding: .3rem .55rem;
            border-radius: 6px;
        }

        .change-badge.up   { background: rgba(0,229,176,.12);  color: var(--up); }
        .change-badge.down { background: rgba(255, 61, 90,.12); color: var(--down); }

        /* ── divider ── */
        .coin-divider {
            width: 100%;
            height: 1px;
            background: var(--border);
        }

        /* ── arrow indicator ── */
        .coin-arrow {
            align-self: flex-end;
            font-size: .75rem;
            color: var(--muted);
            transition: color .2s, transform .2s;
        }

        .coinstat:hover .coin-arrow {
            color: var(--accent);
            transform: translateX(4px);
        }

    </style>
</head>

<header class="topbar">
  <div class="topbar-inner">
    <div class="left">
      <span class="logo">AUTIZMUS MAXIMUS</span>
    </div>
    <div class="right">
      <button class="login">👤 Account</button>
      <button class="logout"><a href="/logout">Log Out</a></button>
    </div>
  </div>
</header>

<div class="page-wrapper">

  <div class="section-header">
    <h2>Markets</h2>
    <span class="sub">Live prices</span>
  </div>

  <div class="coinstatcont">

    %for coin_id, data in box_el.items():
    <div class="coinstat">
        <button class="coin-select" onclick="location.href='/coin/{{coin_id}}'">

            <div class="coin-top">
                <img src="{{data['logo']}}" class="coin-logo" alt="{{data['name']}}">
                <h1 class="coin-name">{{data["name"]}}</h1>
            </div>

            <div class="coin-divider"></div>

            <div class="coin-price-row">
                <div>
                    <div class="price-label">Price today</div>
                    %if 0 > data["change"]:
                    <span class="price-value down">{{round(data["price"], 2)}}$</span>
                    %else:
                    <span class="price-value up">{{round(data["price"], 2)}}$</span>
                    %end
                </div>
                %if 0 > data["change"]:
                <span class="change-badge down">▼ {{round(abs(data["change"]), 2)}}%</span>
                %else:
                <span class="change-badge up">▲ {{round(data["change"], 2)}}%</span>
                %end
            </div>

            <span class="coin-arrow">→</span>

        </button>
    </div>
    %end

  </div>
</div>

<body>
</body>
</html>
