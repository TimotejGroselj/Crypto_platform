<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/static/login.css" />
</head>
<body>
<div class="login-box">
    <h2>Register</h2>
    <form method="post" action="/register">
        <div class="input-group">
            <input type="text" name = "username" placeholder="Username" required value = "{{username or ''}}" />
        </div>
        <div class="input-group">
            <input type="text" name = "email" placeholder="Email" required value="{{email or ''}}" />
        </div>
        % if error == 'Invalid email address.':
            <p class="incorrect-input">{{error}}</p>
        % end
        % if error == 'An account with this email already exists.':
            <p class="incorrect-input">{{error}}</p>
        % end
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 17px;">
            <div class="input-group" style="flex: 1; margin-bottom: 0;">
                <input type="password" name="confirm_password" placeholder="Password" value="{{password or ''}}" required id="FakePass1"/>
            </div>
            <input type="checkbox" onclick="SeePass('FakePass1')" style="width:16px; height:16px; margin:0; flex-shrink:0;">
        </div>
        % if error == 'Please choose a stronger password.':
            <p class="incorrect-input">{{error}}</p>
        % end
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 17px;">
            <div class="input-group" style="flex: 1; margin-bottom: 0;">
                <input type="password" name="password" placeholder="Password" value="{{password or ''}}" required id="FakePass2"/>
            </div>
            <input type="checkbox" onclick="SeePass('FakePass2')" style="width:16px; height:16px; margin:0; flex-shrink:0;">
        </div>
        % if error == 'Passwords do not match.':
            <p class="incorrect-input">{{error}}</p>
        % end
        <div class="input-group">
            <input type="number" name = "assets" placeholder="Add assets" required min="1"/>
        </div>
        <button type="submit">Sign Up</button>
    </form>
</div>
<script>
    function SeePass(id) {
        var x = document.getElementById(id)
        if (x.type === "password"){
            x.type = "text";
        }
        else {
            x.type = "password"
        }
    }
</script>
</body>
</html>
